services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: astrometrics
      POSTGRES_USER: astrometrics
      POSTGRES_PASSWORD: astrometrics
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrometrics"]
      interval: 2s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: astrometrics
    container_name: astrometrics
    volumes:
      - .:/app:z
      - /app/.venv
      - ${HOME}/cert.pem:/certs/cert.pem:ro
      - ${HOME}/key.pem:/certs/key.pem:ro
    ports:
      - '443:443'
    environment:
      DJANGO_SETTINGS_MODULE: astrometrics.local_settings
      DATABASE_URL: postgres://astrometrics:astrometrics@db:5432/astrometrics
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
