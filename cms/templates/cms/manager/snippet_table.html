<div class="mgr-table-wrap">
    <table class="mgr-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Key</th>
                <th>Updated</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for snippet in snippets %}
            <tr>
                <td style="font-weight:500;">{{ snippet.name }}</td>
                <td>
                    <code style="font-size:0.8rem; background:var(--surface-2); padding:.15rem .4rem; border-radius:4px; color:var(--muted);">{{ snippet.key }}</code>
                </td>
                <td style="color:var(--muted); font-size:0.82rem;">{{ snippet.updated_at|date:"d M Y" }}</td>
                <td style="text-align:right;">
                    <div style="display:flex; gap:.5rem; justify-content:flex-end;">
                        <a href="{% url 'cms_manager:snippet_edit' snippet.pk %}" class="btn-mgr-secondary" style="padding:.3rem .7rem;"><i class="bi bi-pencil"></i></a>
                        <a href="{% url 'cms_manager:snippet_delete' snippet.pk %}" class="btn-mgr-danger" style="padding:.3rem .7rem;"><i class="bi bi-trash"></i></a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="text-align:center; padding:2.5rem; color:var(--muted);">
                    <i class="bi bi-puzzle" style="font-size:1.5rem; display:block; margin-bottom:.5rem;"></i>
                    No snippets found.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
