{% load static %}
<link rel="stylesheet" href="{% static 'css/manifesto.css' %}">
<section class="manifesto-hero" aria-labelledby="manifesto-hero-heading" style="background-color: {{ block.bg_color }}; color: {{ block.text_color }};">
    <div class="container">
        <!-- Concentric white circles - clipped to show only lower-right quadrant -->
        <div class="manifesto-hero-circles-wrapper" aria-hidden="true">
            <svg class="manifesto-hero-circles" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" overflow="visible">
                <defs>
                    <clipPath id="right-half-clip">
                        <rect x="0" y="0" width="800" height="800"/>
                    </clipPath>
                </defs>
                <g clip-path="url(#right-half-clip)">
                    <circle cx="0" cy="0" r="120" fill="none" stroke="#fff" stroke-width="55"/>
                    <circle cx="0" cy="0" r="230" fill="none" stroke="#fff" stroke-width="55"/>
                    <circle cx="0" cy="0" r="340" fill="none" stroke="#fff" stroke-width="55"/>
                </g>
            </svg>
        </div>
        <div class="manifesto-hero-inner">
            <div class="manifesto-hero-content">
                <h1 id="manifesto-hero-heading" class="manifesto-hero-heading spectral-bold">
                    {{ block.heading }}
                </h1>
                <p class="manifesto-hero-sub">
                    {{ block.sub_heading }}
                </p>
            </div>
            <div class="manifesto-hero-image-wrapper">
                <img src="{% static 'img/manifesto-hero.png' %}"
                     alt="{{ block.hero_image_alt }}"
                     class="manifesto-hero-image">
            </div>
        </div>
    </div>
</section>
