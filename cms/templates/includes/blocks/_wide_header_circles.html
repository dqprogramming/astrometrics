<link rel="stylesheet" href="/static/css/about_us.css">
<section class="about-hero" style="background-color: {{ block.bg_color }}; color: {{ block.text_color }};" aria-labelledby="about-hero-heading-{{ block.pk }}">
    <div class="container">
        <div class="about-hero-circles-wrapper" aria-hidden="true">
            <svg class="about-hero-circles" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" overflow="visible">
                <defs>
                    <clipPath id="about-right-half-clip-{{ block.pk }}">
                        <rect x="0" y="0" width="800" height="800"/>
                    </clipPath>
                </defs>
                <g clip-path="url(#about-right-half-clip-{{ block.pk }})">
                    <circle cx="400" cy="400" r="120" fill="none" stroke="{{ block.circle_color }}" stroke-width="55"/>
                    <circle cx="400" cy="400" r="230" fill="none" stroke="{{ block.circle_color }}" stroke-width="55"/>
                    <circle cx="400" cy="400" r="340" fill="none" stroke="{{ block.circle_color }}" stroke-width="55"/>
                </g>
            </svg>
        </div>
        <div class="about-hero-inner">
            <h1 id="about-hero-heading-{{ block.pk }}" class="about-hero-heading spectral-bold" style="color: {{ block.text_color }};">
                {{ block.heading }}
            </h1>
            {% if block.sub_heading %}
            <p class="about-hero-sub" style="color: {{ block.text_color }};">{{ block.sub_heading }}</p>
            {% endif %}
        </div>
    </div>
</section>
