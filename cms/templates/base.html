<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Open Journals Collective{% endblock %}</title>

    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">

    <!-- normalize -->
    <link rel="stylesheet" href="/static/css/normalize.min.css">

    <!-- app styles -->
    <link rel="stylesheet" href="/static/css/app.css">
    <link rel="stylesheet" href="/static/css/landing.css">
    <link rel="stylesheet" href="/static/css/font.css">

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap"
          rel="stylesheet">

    <!-- Glide/carousel -->
    <link rel="stylesheet" href="/static/css/glide.core.min.css">
    <link rel="stylesheet" href="/static/css/glide.theme.min.css">
    <script src="/static/js/glide.min.js"></script>
    <script src="/static/js/nav.js"></script>
    <script src="/static/js/a11y.js"></script>

    <!-- htmx -->
    <script src="/static/js/htmx-1.9.12.min.js"></script>

    {% block extra_head %}{% endblock %}
</head>
<body>
{% include "includes/header.html" %}

{% block content %}{% endblock %}

{% include "includes/footer.html" %}

{% block extra_scripts %}{% endblock %}
</body>
</html>
