{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publisher Portal — Sign In</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/portal.css' %}">
</head>
<body class="portal-body portal-login-body">
<div class="portal-login-wrap">
    <div class="portal-login-card">
        <div class="portal-login-brand">
            <span class="portal-brand-dot"></span>
            OJC Publisher Portal
        </div>
        <h1 class="portal-login-title">Sign in</h1>

        {% if form.errors %}
        <div class="portal-alert portal-alert-error">
            <i class="bi bi-exclamation-triangle"></i>
            Invalid username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="portal-field">
                <label class="portal-label" for="{{ form.username.id_for_label }}">Username</label>
                {{ form.username }}
            </div>
            <div class="portal-field">
                <label class="portal-label" for="{{ form.password.id_for_label }}">Password</label>
                {{ form.password }}
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="portal-btn-primary w-100">Sign in</button>
        </form>
    </div>
</div>
</body>
</html>
