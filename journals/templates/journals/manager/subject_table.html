<div class="mgr-table-wrap">
    <table class="mgr-table">
        <thead>
            <tr><th>Name</th><th>Journals</th><th></th></tr>
        </thead>
        <tbody>
            {% for subject in subjects %}
            <tr>
                <td style="font-weight:500;">{{ subject.name }}</td>
                <td><span class="mgr-badge mgr-badge-gray">{{ subject.journal_count }}</span></td>
                <td style="text-align:right;">
                    <div style="display:flex; gap:.5rem; justify-content:flex-end;">
                        <a href="{% url 'journals_manager:subject_edit' subject.pk %}" class="btn-mgr-secondary" style="padding:.3rem .7rem;"><i class="bi bi-pencil"></i></a>
                        <a href="{% url 'journals_manager:subject_delete' subject.pk %}" class="btn-mgr-danger" style="padding:.3rem .7rem;"><i class="bi bi-trash"></i></a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" style="text-align:center; padding:2.5rem; color:var(--muted);">No subjects found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
