<div class="mgr-table-wrap">
    <table class="mgr-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Website</th>
                <th>Journals</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            {% for publisher in publishers %}
            <tr>
                <td style="font-weight:500;">{{ publisher.name }}</td>
                <td style="font-size:0.85rem;">
                    {% if publisher.website %}
                    <a href="{{ publisher.website }}" target="_blank" style="color:var(--accent-fg);">{{ publisher.website }}</a>
                    {% else %}—{% endif %}
                </td>
                <td><span class="mgr-badge mgr-badge-gray">{{ publisher.journal_count }}</span></td>
                <td style="text-align:right;">
                    <div style="display:flex; gap:.5rem; justify-content:flex-end;">
                        <a href="{% url 'journals_manager:publisher_edit' publisher.pk %}" class="btn-mgr-secondary" style="padding:.3rem .7rem;"><i class="bi bi-pencil"></i></a>
                        <a href="{% url 'journals_manager:publisher_delete' publisher.pk %}" class="btn-mgr-danger" style="padding:.3rem .7rem;"><i class="bi bi-trash"></i></a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="text-align:center; padding:2.5rem; color:var(--muted);">
                    <i class="bi bi-building" style="font-size:1.5rem; display:block; margin-bottom:.5rem;"></i>
                    No publishers found.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
