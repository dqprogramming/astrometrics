<div class="mgr-table-wrap">
    <table class="mgr-table">
        <thead>
            <tr><th>Name</th><th>Code</th><th>Journals</th><th></th></tr>
        </thead>
        <tbody>
            {% for language in languages %}
            <tr>
                <td style="font-weight:500;">{{ language.name }}</td>
                <td><code style="font-size:0.82rem; background:var(--surface-2); padding:.1rem .4rem; border-radius:4px; color:var(--muted);">{{ language.code|default:"—" }}</code></td>
                <td><span class="mgr-badge mgr-badge-gray">{{ language.journal_count }}</span></td>
                <td style="text-align:right;">
                    <div style="display:flex; gap:.5rem; justify-content:flex-end;">
                        <a href="{% url 'journals_manager:language_edit' language.pk %}" class="btn-mgr-secondary" style="padding:.3rem .7rem;"><i class="bi bi-pencil"></i></a>
                        <a href="{% url 'journals_manager:language_delete' language.pk %}" class="btn-mgr-danger" style="padding:.3rem .7rem;"><i class="bi bi-trash"></i></a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="text-align:center; padding:2.5rem; color:var(--muted);">No languages found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
