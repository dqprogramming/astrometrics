repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: tests
        name: run tests
        entry: uv run python manage.py test --settings=astrometrics.test_settings --no-input
        language: system
        pass_filenames: false
        always_run: true